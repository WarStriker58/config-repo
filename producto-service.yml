spring:
  application:
    name: producto-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

mensaje:
  texto: Configuración obtenida desde Config Server para Producto Service

# 🛠️ CONFIGURACIÓN DE RESILIENCE4J CIRCUIT BREAKER
resilience4j:
  circuitbreaker:
    instances:
      categoriaService: # Debe llamarse EXACTAMENTE igual que el 'name' de tu anotación @CircuitBreaker
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5          # Analiza las últimas 5 llamadas
        failureRateThreshold: 50       # Si el 50% falla, abre el circuito
        waitDurationInOpenState: 10s   # Espera 10 segundos antes de intentar reconectar (Half-Open)
        permittedNumberOfCallsInHalfOpenState: 3 # En Half-Open, deja pasar 3 llamadas de prueba

# Habilitar los endpoints de monitoreo en Actuator (Opcional pero recomendado)
management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers
  endpoint:
    health:
      show-details: always
