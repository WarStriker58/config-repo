server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bd_producto_dev
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

empresa:
  ambiente: desarrollo

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

# 🛡️ CONFIGURACIÓN DE RESILIENCE4J REUBICADA EN LA NUBE
# 🛡️ RESILIENCE4J EN LA NUBE PARA PEDIDOS
resilience4j:
  circuitbreaker:
    instances:
      categoriaService:
      productoService: # Debe coincidir con el 'name' de la anotación en ProductoCircuitService
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

mensaje:
  texto: Configuración obtenida desde Config Server para Producto Service
